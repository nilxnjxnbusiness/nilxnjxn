name: Sync to Fork via PR

on:
  push:
    branches:
      - main 
  workflow_dispatch: 

jobs:
  sync-to-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Pull, Create PR, and Auto-Merge to Fork
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
          
          FORK_REPO: "nilxnjxn/nilxnjxn"
          
          TARGET_BRANCH: "main" 
        run: |
          echo "Starting sync process to $FORK_REPO..."
          
          # 1. Configure Git as a bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Clone the remote FORK repository using the PAT for authentication
          git clone https://x-access-token:${GH_TOKEN}@github.com/${FORK_REPO}.git target-fork
          cd target-fork

          # 3. Add THIS main repository as the "upstream" remote
          git remote add upstream https://github.com/${{ github.repository }}.git
          git fetch upstream

          # 4. Create a unique branch name for the sync PR
          SYNC_BRANCH="auto-sync-$(date +%s)"
          git checkout -b $SYNC_BRANCH

          # 5. Merge the latest changes from the main repo into this sync branch
          # We use --allow-unrelated-histories just in case git histories diverged slightly
          git merge upstream/${TARGET_BRANCH} --allow-unrelated-histories -m "chore: automated sync from upstream"

          # 6. Push the new sync branch up to the target fork repository
          git push origin $SYNC_BRANCH

          # 7. Create a Pull Request in the fork repository using the GitHub CLI
          echo "Creating Pull Request on $FORK_REPO..."
          PR_URL=$(gh pr create \
            --repo $FORK_REPO \
            --base $TARGET_BRANCH \
            --head $SYNC_BRANCH \
            --title "Auto-Sync: Updates from Upstream Main" \
            --body "This PR was automatically generated by GitHub Actions to sync the latest changes from the main repository (${{ github.repository }})." \
            --fill)
            
          echo "Pull request created: $PR_URL"

          # 8. Automatically merge the Pull Request using the GitHub CLI
          echo "Auto-merging the Pull Request..."
          gh pr merge $PR_URL --merge --auto --repo $FORK_REPO --delete-branch
          
          # 9. Trigger Vercel Deployment Hook (if deployment triggers on 'main' push/merge)
          echo "Triggering Vercel Deployment Hook..."
          curl -X POST https://api.vercel.com/v1/integrations/deploy/prj_ygjbV5TRx4H6aTluose7utZSHvdO/0vqC4qlSQD
          
          echo "Sync and deploy trigger complete!"
